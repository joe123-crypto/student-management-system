name: Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Auth typecheck
        run: npm run typecheck:auth

      - name: Auth regression tests
        run: npm run test:auth

      - name: Build
        run: npm run build

  preview:
    name: Preview Deploy (PR)
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.fork == false && secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != ''
    needs: preflight
    runs-on: ubuntu-latest
    environment:
      name: preview
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel preview environment
        run: vercel pull --yes --environment=preview --git-branch=${{ github.head_ref }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Apply preview Prisma migrations
        run: vercel env run -e preview --git-branch=${{ github.head_ref }} --token=${{ secrets.VERCEL_TOKEN }} -- npm run prisma:migrate:deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Verify preview Prisma schema
        run: printf 'SELECT 1 FROM "RateLimitBucket" LIMIT 1;' | vercel env run -e preview --git-branch=${{ github.head_ref }} --token=${{ secrets.VERCEL_TOKEN }} -- npx prisma db execute --stdin --schema prisma/schema.prisma
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build preview artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy preview
        id: deploy_preview
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --yes \
            -m githubDeployment=1 \
            -m githubCommitRef=${{ github.head_ref }} \
            -m githubCommitSha=${{ github.event.pull_request.head.sha }} \
            -m githubCommitOrg=${{ github.repository_owner }} \
            -m githubCommitRepo=${{ github.event.repository.name }} \
            -m githubOrg=${{ github.repository_owner }} \
            -m githubRepo=${{ github.event.repository.name }} \
            --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -n 1)
          echo "Preview URL: $DEPLOYMENT_URL"
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Smoke check preview
        run: |
          BASE_URL=${{ steps.deploy_preview.outputs.deployment_url }}
          curl -f "$BASE_URL/"
          curl -f "$BASE_URL/login"
          curl -f "$BASE_URL/onboarding"
          curl -f "$BASE_URL/attache"

  production:
    name: Production Deploy (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != ''
    needs: preflight
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Apply production Prisma migrations
        run: vercel env run -e production --token=${{ secrets.VERCEL_TOKEN }} -- npm run prisma:migrate:deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Verify production Prisma schema
        run: printf 'SELECT 1 FROM "RateLimitBucket" LIMIT 1;' | vercel env run -e production --token=${{ secrets.VERCEL_TOKEN }} -- npx prisma db execute --stdin --schema prisma/schema.prisma
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build production artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to production
        id: deploy_production
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --yes \
            -m githubDeployment=1 \
            -m githubCommitRef=${{ github.ref_name }} \
            -m githubCommitSha=${{ github.sha }} \
            -m githubCommitOrg=${{ github.repository_owner }} \
            -m githubCommitRepo=${{ github.event.repository.name }} \
            -m githubOrg=${{ github.repository_owner }} \
            -m githubRepo=${{ github.event.repository.name }} \
            --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -n 1)
          echo "Production URL: $DEPLOYMENT_URL"
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Smoke check production
        run: |
          BASE_URL=${{ steps.deploy_production.outputs.deployment_url }}
          curl -f "$BASE_URL/"
          curl -f "$BASE_URL/login"
          curl -f "$BASE_URL/onboarding"
          curl -f "$BASE_URL/attache"
