name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Lint, Typecheck, Auth Typecheck, Auth Tests, Storage Tests, Build, Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Auth typecheck
        run: npm run typecheck:auth

      - name: Auth regression tests
        run: npm run test:auth

      - name: Storage regression tests
        run: npm run test:storage

      - name: Build
        run: npm run build

      - name: Security audit (high+)
        run: npm run audit:high
